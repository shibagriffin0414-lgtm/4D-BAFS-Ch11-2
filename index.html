<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BAFS Master: Bad Debts & Allowances</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Babel for React compilation -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <!-- Import Map for React & Icons -->
    <script type="importmap">
    {
      "imports": {
        "react": "https://esm.sh/react@18.2.0",
        "react-dom/client": "https://esm.sh/react-dom@18.2.0/client",
        "lucide-react": "https://esm.sh/lucide-react@0.263.1"
      }
    }
    </script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&family=JetBrains+Mono:wght@400;700&display=swap');
        
        body {
            font-family: 'Inter', sans-serif;
            background-color: #0f172a;
            color: #e2e8f0;
        }
        
        .mono {
            font-family: 'JetBrains Mono', monospace;
        }

        /* Custom Scrollbar */
        ::-webkit-scrollbar {
            width: 8px;
        }
        ::-webkit-scrollbar-track {
            background: #1e293b; 
        }
        ::-webkit-scrollbar-thumb {
            background: #475569; 
            border-radius: 4px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #64748b; 
        }

        .glass-panel {
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(148, 163, 184, 0.1);
        }

        .fade-in {
            animation: fadeIn 0.3s ease-in-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel" data-type="module">
        import React, { useState, useEffect } from 'react';
        import { createRoot } from 'react-dom/client';
        import { 
          TrendingUp, 
          BookOpen, 
          List, 
          Network, 
          X, 
          Calculator, 
          ArrowRight, 
          PlayCircle, 
          Play, 
          AlertTriangle, 
          Video, 
          PenTool,
          Youtube,
          ExternalLink,
          PieChart,
          FileText
        } from 'lucide-react';

        // Icon mapping
        const IconMap = {
          TrendingUp, BookOpen, List, Network, X, Calculator, ArrowRight, PlayCircle, Play, AlertTriangle, Video, PenTool, Youtube, ExternalLink, PieChart, FileText
        };

        const Icon = ({ name, size = 20, className }) => {
            const LucideIcon = IconMap[name];
            if (!LucideIcon) return <span className="text-xs">?</span>;
            return <LucideIcon size={size} className={className} />;
        };

        // --- Content Data ---

        const summaryContent = [
            {
                id: 'intro',
                title: 'Introduction & Statistics',
                icon: 'TrendingUp',
                content: (
                    <div className="space-y-4">
                        <p>In the trading environment, credit sales create <strong>Trade Receivables</strong>. However, businesses face the risk that customers may fail to pay due to bankruptcy or liquidation.</p>
                        <div className="bg-slate-800 p-4 rounded-lg border-l-4 border-cyan-500">
                            <h4 className="font-bold text-cyan-400 mb-2">Real-World Context (HK 2020)</h4>
                            <ul className="list-disc pl-5 space-y-1 text-sm text-slate-300">
                                <li><strong>6,685</strong> Bankruptcy Orders</li>
                                <li><strong>234</strong> Compulsory Winding-up Orders</li>
                            </ul>
                            <p className="text-xs text-slate-400 mt-2 italic">Source: Official Receiver's Office</p>
                        </div>
                        <p className="text-sm"><strong>Accrual vs. Cash:</strong> Under accrual accounting, sales are recognized when earned. Prudence dictates we must anticipate potential losses from these sales.</p>
                    </div>
                )
            },
            {
                id: 'concepts',
                title: 'Core Accounting Concepts',
                icon: 'BookOpen',
                content: (
                    <div className="space-y-4">
                        <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                            <div className="bg-slate-800 p-4 rounded-lg">
                                <h4 className="font-bold text-purple-400">Prudence Concept</h4>
                                <p className="text-sm text-slate-300 mt-2">Expenses and liabilities should be recognized as soon as they are possible. Assets should not be overstated.</p>
                            </div>
                            <div className="bg-slate-800 p-4 rounded-lg">
                                <h4 className="font-bold text-green-400">Matching Concept</h4>
                                <p className="text-sm text-slate-300 mt-2">Revenues and related expenses (like bad debt expense) must be recorded in the same accounting period.</p>
                            </div>
                        </div>
                        <h4 className="font-bold mt-4">Key Definitions</h4>
                        <ul className="space-y-2 text-sm">
                            <li><strong className="text-red-400">Bad Debts:</strong> Receivables definitely proven uncollectible.</li>
                            <li><strong className="text-yellow-400">Allowance for Doubtful Accounts:</strong> An estimate of receivables likely to become uncollectible. A <em>contra-asset</em> account.</li>
                            <li><strong className="text-blue-400">Net Realisable Value:</strong> Trade Receivables minus Allowance.</li>
                        </ul>
                    </div>
                )
            },
            {
                id: 'allowance_types',
                title: 'Specific vs. General Allowance',
                icon: 'PieChart',
                content: (
                    <div className="space-y-4">
                        <p className="text-sm text-slate-300">Allowances are categorized into two types based on how they are estimated:</p>
                        
                        <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                            <div className="bg-slate-800 p-4 rounded-lg border border-orange-500/30">
                                <h4 className="font-bold text-orange-400 mb-2">1. Specific Allowance</h4>
                                <p className="text-sm text-slate-300 mb-2">Created for a <strong>specific debtor</strong> who is known to be facing financial difficulties (e.g., liquidation, dispute).</p>
                                <div className="bg-slate-900 p-2 rounded text-xs mono text-orange-200">
                                    Calculation: Exact amount doubtful for that customer.
                                </div>
                            </div>

                            <div className="bg-slate-800 p-4 rounded-lg border border-blue-500/30">
                                <h4 className="font-bold text-blue-400 mb-2">2. General Allowance</h4>
                                <p className="text-sm text-slate-300 mb-2">Applied to the <strong>remaining pool</strong> of receivables to cover potential (unknown) future losses based on past experience.</p>
                                <div className="bg-slate-900 p-2 rounded text-xs mono text-blue-200">
                                    Calculation: % × (Total Receivables - Bad Debts - Specific Allowance Amounts)
                                </div>
                            </div>
                        </div>
                        
                        <div className="bg-yellow-500/10 p-3 rounded-lg border border-yellow-500/20 text-sm">
                            <strong className="text-yellow-400">Important Rule:</strong> When calculating General Allowance, you must exclude the debts already identified as Specific Allowances to avoid double counting.
                        </div>
                    </div>
                )
            },
            {
                id: 'comprehensive_example',
                title: 'Comprehensive Worked Example',
                icon: 'FileText',
                content: (
                    <div className="space-y-6 text-sm">
                        <div className="bg-slate-800/50 p-4 rounded-lg border border-slate-700">
                            <h4 className="font-bold text-white mb-2">Scenario (Year ended 31 Dec 2023)</h4>
                            <ul className="list-disc pl-5 space-y-1 text-slate-300">
                                <li>Trade Receivables balance: <strong>$100,000</strong></li>
                                <li>Allowance for Doubtful Accounts (1 Jan 2023): <strong>$2,000</strong></li>
                                <li><strong>Adjustments required:</strong>
                                    <ol className="list-decimal pl-5 mt-1 text-slate-400">
                                        <li>Mr. A is bankrupt. Write off his debt of <strong>$1,000</strong>.</li>
                                        <li>Mr. B (owing <strong>$500</strong>) is facing difficulties. Specific allowance required.</li>
                                        <li>General allowance of <strong>5%</strong> on remaining receivables.</li>
                                    </ol>
                                </li>
                            </ul>
                        </div>

                        {/* Step 1: Workings */}
                        <div>
                            <h4 className="font-bold text-cyan-400 mb-2">Step 1: Calculate Closing Allowance</h4>
                            <div className="bg-slate-900 p-4 rounded-lg font-mono text-xs md:text-sm space-y-2">
                                <div className="flex justify-between border-b border-slate-700 pb-2">
                                    <span>Trade Receivables (Gross)</span>
                                    <span>$100,000</span>
                                </div>
                                <div className="flex justify-between text-red-400">
                                    <span>Less: Bad Debts Written Off (Mr. A)</span>
                                    <span>($1,000)</span>
                                </div>
                                <div className="flex justify-between font-bold">
                                    <span>Adjusted Trade Receivables</span>
                                    <span>$99,000</span>
                                </div>
                                
                                <div className="pt-2 text-slate-400 italic">// Specific Allowance</div>
                                <div className="flex justify-between">
                                    <span>Mr. B (Specific)</span>
                                    <span className="text-orange-400">$500</span>
                                </div>

                                <div className="pt-2 text-slate-400 italic">// General Allowance Calculation</div>
                                <div className="flex justify-between text-slate-500">
                                    <span>Remaining Pool ($99,000 - $500)</span>
                                    <span>$98,500</span>
                                </div>
                                <div className="flex justify-between border-b border-slate-700 pb-2">
                                    <span>General Allowance (5% x $98,500)</span>
                                    <span className="text-blue-400">$4,925</span>
                                </div>

                                <div className="flex justify-between font-bold text-green-400 pt-1">
                                    <span>Total Closing Allowance Required</span>
                                    <span>$5,425</span>
                                </div>
                            </div>
                        </div>

                        {/* Step 2: Financial Statements */}
                        <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                            <div>
                                <h4 className="font-bold text-cyan-400 mb-2">Income Statement (Extract)</h4>
                                <div className="bg-white text-slate-900 p-3 rounded shadow-lg text-xs font-mono">
                                    <div className="font-bold border-b border-black mb-1">Expenses</div>
                                    <div className="flex justify-between">
                                        <span>Bad Debts (Write-off)</span>
                                        <span>$1,000</span>
                                    </div>
                                    <div className="flex justify-between">
                                        <span>Increase in Allowance<br/><span className="text-[10px] text-slate-500">($5,425 c/f - $2,000 b/f)</span></span>
                                        <span>$3,425</span>
                                    </div>
                                    <div className="flex justify-between border-t border-black mt-1 pt-1 font-bold">
                                        <span>Total Expense</span>
                                        <span>$4,425</span>
                                    </div>
                                </div>
                            </div>

                            <div>
                                <h4 className="font-bold text-cyan-400 mb-2">Statement of Fin. Position (Extract)</h4>
                                <div className="bg-white text-slate-900 p-3 rounded shadow-lg text-xs font-mono">
                                    <div className="font-bold border-b border-black mb-1">Current Assets</div>
                                    <div className="flex justify-between">
                                        <span>Trade Receivables</span>
                                        <span>$99,000</span>
                                    </div>
                                    <div className="flex justify-between text-red-600">
                                        <span>Less: Allowance for Doubtful A/c</span>
                                        <span>($5,425)</span>
                                    </div>
                                    <div className="flex justify-between border-t border-black mt-1 pt-1 font-bold">
                                        <span>Net Realisable Value</span>
                                        <span>$93,575</span>
                                    </div>
                                </div>
                            </div>
                        </div>

                        {/* Step 3: T-Account */}
                        <div>
                            <h4 className="font-bold text-cyan-400 mb-2">Allowance for Doubtful Accounts (T-Account)</h4>
                            <div className="border border-slate-600 rounded bg-slate-900 p-4 font-mono text-xs overflow-x-auto">
                                <div className="grid grid-cols-2 gap-8 min-w-[300px]">
                                    {/* Debit Side */}
                                    <div>
                                        <div className="border-b border-slate-500 mb-2 pb-1 font-bold text-center">Debit</div>
                                        <div className="flex justify-between group">
                                            <span>Dec 31 Balance c/f</span>
                                            <span className="font-bold text-green-400">$5,425</span>
                                        </div>
                                    </div>
                                    
                                    {/* Credit Side */}
                                    <div className="border-l border-slate-600 pl-8 -ml-4">
                                        <div className="border-b border-slate-500 mb-2 pb-1 font-bold text-center">Credit</div>
                                        <div className="flex justify-between">
                                            <span>Jan 1 Balance b/f</span>
                                            <span>$2,000</span>
                                        </div>
                                        <div className="flex justify-between text-yellow-400">
                                            <span>Dec 31 Profit & Loss</span>
                                            <span>$3,425</span>
                                        </div>
                                    </div>
                                </div>
                                <div className="grid grid-cols-2 gap-8 mt-2 border-t border-double border-slate-500 pt-1">
                                     <div className="text-right pr-2 font-bold">$5,425</div>
                                     <div className="text-right font-bold">$5,425</div>
                                </div>
                            </div>
                        </div>
                    </div>
                )
            },
            {
                id: 'entries',
                title: 'Double Entry System',
                icon: 'List',
                content: (
                    <div className="space-y-6">
                        <div>
                            <h4 className="font-bold text-lg mb-2">1. Writing off a Bad Debt</h4>
                            <div className="mono bg-black p-3 rounded text-sm border border-slate-700">
                                <div className="text-green-400">Dr Allowance for Doubtful Accounts</div>
                                <div className="text-red-400 pl-8">Cr Trade Receivables</div>
                                <div className="text-slate-500 italic mt-1">// Eliminate the debtor's balance</div>
                            </div>
                        </div>

                        <div>
                            <h4 className="font-bold text-lg mb-2">2. Year-End Adjustment</h4>
                            <p className="text-sm mb-2">First, calculate the required ending allowance.</p>
                            <div className="mono bg-black p-3 rounded text-sm border border-slate-700">
                                <div className="text-slate-400 mb-1">If Allowance needs to INCREASE:</div>
                                <div className="text-green-400">Dr Bad Debts (Expense)</div>
                                <div className="text-red-400 pl-8">Cr Allowance for Doubtful Accounts</div>
                            </div>
                            <div className="mono bg-black p-3 rounded text-sm border border-slate-700 mt-2">
                                <div className="text-slate-400 mb-1">If Allowance needs to DECREASE:</div>
                                <div className="text-green-400">Dr Allowance for Doubtful Accounts</div>
                                <div className="text-red-400 pl-8">Cr Bad Debts (Revenue)</div>
                            </div>
                        </div>
                        
                        <div>
                            <h4 className="font-bold text-lg mb-2">3. Bad Debt Recovery</h4>
                            <div className="mono bg-black p-3 rounded text-sm border border-slate-700">
                                <div className="text-slate-400 mb-1">Step A: Reinstate Debt</div>
                                <div className="text-green-400">Dr Trade Receivables</div>
                                <div className="text-red-400 pl-8">Cr Allowance for Doubtful Accounts</div>
                                <div className="text-slate-400 mb-1 mt-2">Step B: Record Receipt</div>
                                <div className="text-green-400">Dr Bank/Cash</div>
                                <div className="text-red-400 pl-8">Cr Trade Receivables</div>
                            </div>
                        </div>
                    </div>
                )
            }
        ];

        // --- Mind Map Component ---
        const MindMapNode = ({ x, y, label, type, onClick, active }) => {
            const colors = {
                root: 'bg-cyan-600 border-cyan-400',
                concept: 'bg-purple-600 border-purple-400',
                action: 'bg-emerald-600 border-emerald-400',
                output: 'bg-orange-600 border-orange-400'
            };

            return (
                <div 
                    onClick={onClick}
                    className={`absolute transform -translate-x-1/2 -translate-y-1/2 cursor-pointer transition-all duration-300 z-10
                        ${colors[type]} ${active ? 'scale-110 ring-4 ring-white/20' : 'hover:scale-105'}
                        rounded-full flex items-center justify-center text-center shadow-lg border-2`}
                    style={{ left: `${x}%`, top: `${y}%`, width: '120px', height: '120px' }}
                >
                    <span className="text-xs font-bold text-white px-2 pointer-events-none select-none">{label}</span>
                </div>
            );
        };

        const MindMapLine = ({ x1, y1, x2, y2 }) => (
            <svg className="absolute top-0 left-0 w-full h-full pointer-events-none z-0">
                <line x1={`${x1}%`} y1={`${y1}%`} x2={`${x2}%`} y2={`${y2}%`} stroke="#475569" strokeWidth="2" strokeDasharray="5,5" />
            </svg>
        );

        const MindMap = () => {
            const [selectedNode, setSelectedNode] = useState(null);

            const nodes = [
                { id: 1, x: 50, y: 50, label: 'Trade Receivables', type: 'root', info: "The starting point. Amounts owed by customers from credit sales." },
                { id: 2, x: 20, y: 20, label: 'Prudence Concept', type: 'concept', info: "The guiding principle. We must not overstate assets, so we anticipate losses." },
                { id: 3, x: 80, y: 20, label: 'Matching Concept', type: 'concept', info: "Expenses (Bad Debts) must be recorded in the same year as the Revenue (Sales) they relate to." },
                { id: 4, x: 20, y: 80, label: 'Bad Debts (Write-off)', type: 'action', info: "Definite loss. The debtor is bankrupt. Remove immediately from books." },
                { id: 5, x: 80, y: 80, label: 'Allowance (Estimate)', type: 'action', info: "Potential loss. Estimated % of remaining debtors. Adjusts Net Profit." },
                { id: 6, x: 50, y: 85, label: 'Financial Statements', type: 'output', info: "Income Statement shows Expense. Financial Position shows Net Realisable Value." },
            ];

            const connections = [
                { from: 1, to: 2 }, { from: 1, to: 3 },
                { from: 1, to: 4 }, { from: 1, to: 5 },
                { from: 4, to: 6 }, { from: 5, to: 6 }
            ];

            return (
                <div className="h-full flex flex-col">
                    <div className="bg-slate-800 p-4 mb-4 rounded-lg">
                        <h2 className="text-xl font-bold text-cyan-400 flex items-center gap-2">
                            <Icon name="Network" /> Interactive Concept Map
                        </h2>
                        <p className="text-sm text-slate-400">Click a node to explore relationships.</p>
                    </div>
                    
                    <div className="flex-1 relative bg-slate-900 rounded-xl border border-slate-700 overflow-hidden" style={{ minHeight: '500px' }}>
                        {/* Lines */}
                        {connections.map((conn, idx) => {
                            const start = nodes.find(n => n.id === conn.from);
                            const end = nodes.find(n => n.id === conn.to);
                            return <MindMapLine key={idx} x1={start.x} y1={start.y} x2={end.x} y2={end.y} />;
                        })}

                        {/* Nodes */}
                        {nodes.map(node => (
                            <MindMapNode 
                                key={node.id} 
                                {...node} 
                                active={selectedNode?.id === node.id}
                                onClick={() => setSelectedNode(node)} 
                            />
                        ))}

                        {/* Info Panel Overlay */}
                        {selectedNode && (
                            <div className="absolute bottom-4 left-4 right-4 bg-slate-800/90 backdrop-blur border border-cyan-500/30 p-4 rounded-lg shadow-2xl fade-in z-20">
                                <div className="flex justify-between items-start">
                                    <div>
                                        <h3 className="font-bold text-cyan-400 text-lg">{selectedNode.label}</h3>
                                        <p className="text-slate-200 mt-1">{selectedNode.info}</p>
                                    </div>
                                    <button onClick={() => setSelectedNode(null)} className="text-slate-400 hover:text-white">
                                        <Icon name="X" />
                                    </button>
                                </div>
                            </div>
                        )}
                    </div>
                </div>
            );
        };

        // --- Practice Component ---
        const PracticeGenerator = () => {
            const [problem, setProblem] = useState(null);
            const [userAnswer, setUserAnswer] = useState('');
            const [showResult, setShowResult] = useState(false);
            const [feedback, setFeedback] = useState('');
            const [streak, setStreak] = useState(0);

            const generateProblem = () => {
                const types = ['closing_allowance', 'bad_debt_expense', 'net_realisable'];
                const type = types[Math.floor(Math.random() * types.length)];
                
                const debtors = Math.floor(Math.random() * 50 + 50) * 1000; // 50k to 100k
                const oldAllowance = Math.floor(Math.random() * 20 + 10) * 100; // 1k to 3k
                const rate = [0.01, 0.02, 0.03, 0.05][Math.floor(Math.random() * 4)];
                const writeOff = Math.floor(Math.random() * 5 + 1) * 1000; // 1k to 6k
                
                let qText = '';
                let correct = 0;
                let expl = '';

                // Common calculations
                // Note: According to BAFS, allowance is calculated on remaining debtors AFTER write-off
                const remainingDebtors = debtors - writeOff;
                const newAllowance = remainingDebtors * rate;

                if (type === 'closing_allowance') {
                    qText = `At year end, Trade Receivables are $${debtors}. A bad debt of $${writeOff} needs to be written off immediately. The company maintains an Allowance for Doubtful Accounts of ${(rate * 100)}%. Calculate the Closing Balance of the Allowance account.`;
                    correct = newAllowance;
                    expl = `1. Adjust Debtors: $${debtors} - $${writeOff} = $${remainingDebtors}\n2. Apply Rate: $${remainingDebtors} × ${(rate*100)}% = $${correct}`;
                } 
                else if (type === 'bad_debt_expense') {
                    qText = `Trade Receivables: $${debtors}. Existing Allowance b/f: $${oldAllowance}. Bad debts to write off: $${writeOff}. Policy: Allowance of ${(rate * 100)}% on receivables. Calculate the total amount charged to the Income Statement as "Bad Debts" expense.`;
                    
                    // Expense = WriteOff + (NewAllowance - OldAllowance)
                    const changeInAllowance = newAllowance - oldAllowance;
                    correct = writeOff + changeInAllowance;
                    
                    expl = `
                        1. Write Off Amount: $${writeOff}
                        2. New Allowance Target: ($${debtors} - $${writeOff}) × ${(rate*100)}% = $${newAllowance}
                        3. Change in Allowance: $${newAllowance} (New) - $${oldAllowance} (Old) = $${changeInAllowance > 0 ? '+' : ''}${changeInAllowance}
                        4. Total Expense = Write Off ($${writeOff}) + Change ($${changeInAllowance}) = $${correct}
                    `;
                }
                else if (type === 'net_realisable') {
                    qText = `Trade Receivables: $${debtors}. Bad debts to write off: $${writeOff}. Allowance policy: ${(rate * 100)}%. Calculate the Net Realisable Value of Trade Receivables to be shown in the Statement of Financial Position.`;
                    correct = remainingDebtors - newAllowance;
                    expl = `1. Gross Debtors after write-off: $${remainingDebtors}\n2. Allowance: $${remainingDebtors} × ${(rate*100)}% = $${newAllowance}\n3. Net Value = $${remainingDebtors} - $${newAllowance} = $${correct}`;
                }

                setProblem({ text: qText, answer: correct, explanation: expl, type });
                setUserAnswer('');
                setShowResult(false);
            };

            useEffect(() => {
                generateProblem();
            }, []);

            const checkAnswer = () => {
                const userVal = parseFloat(userAnswer);
                if (isNaN(userVal)) return;

                if (Math.abs(userVal - problem.answer) < 1) {
                    setFeedback('Correct! Great job.');
                    setStreak(s => s + 1);
                } else {
                    setFeedback('Incorrect. Review the working below.');
                    setStreak(0);
                }
                setShowResult(true);
            };

            return (
                <div className="h-full flex flex-col space-y-4">
                    <div className="bg-slate-800 p-4 rounded-lg flex justify-between items-center">
                        <h2 className="text-xl font-bold text-cyan-400 flex items-center gap-2">
                            <Icon name="Calculator" /> Infinite Practice Engine
                        </h2>
                        <div className="bg-slate-900 px-3 py-1 rounded-full text-yellow-400 text-sm font-bold">
                            Streak: {streak} 🔥
                        </div>
                    </div>

                    <div className="flex-1 bg-slate-900 p-6 rounded-xl border border-slate-700 flex flex-col justify-center items-center">
                        {problem && (
                            <div className="w-full max-w-2xl">
